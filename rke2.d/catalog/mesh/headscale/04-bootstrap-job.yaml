apiVersion: v1
kind: ServiceAccount
metadata:
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
subjects:
- kind: ServiceAccount
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
roleRef:
  kind: Role
  name: headscale-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      annotations:
        flox.dev/environment: "${headscale-flox-env}" # kpt-set: ${headscale-flox-env}
    spec:
      runtimeClassName: flox
      serviceAccountName: headscale-bootstrap
      restartPolicy: OnFailure
      containers:
      - name: bootstrap
        image: flox/empty:1.0.0
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
            ephemeral-storage: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
            ephemeral-storage: 256Mi
        env:
        - name: HEADSCALE_NAMESPACE
          value: ${headscale-namespace} # kpt-set: ${headscale-namespace}
        - name: FLOX_NO_TELEMETRY
          value: "1"
        - name: FLOX_NONINTERACTIVE
          value: "1"
        command:
        - bash
        - -c
        - |
          set -ex

          : "Waiting for headscale deployment to be available..."
          kubectl wait --for=condition=available deployment/headscale \
            -n "$HEADSCALE_NAMESPACE" --timeout=300s

          : "Waiting for headscale pod to be Ready..."
          kubectl wait --for=condition=Ready pod -l app=headscale \
            -n "$HEADSCALE_NAMESPACE" --timeout=300s

          # Use kubectl exec to run headscale CLI inside the pod
          # The CLI has direct access to headscale without API key requirements

          : "Creating admin user..."
          kubectl exec -n "$HEADSCALE_NAMESPACE" deployment/headscale -- \
            headscale users create admin 2>/dev/null || echo "User admin already exists"

          : "Getting admin user ID..."
          USER_ID=$( kubectl exec -n "$HEADSCALE_NAMESPACE" deployment/headscale -- \
                        headscale users list -o yaml |
                        yq eval -r '.[] | select(.name=="admin") | .id' - )
          if [ -z "$USER_ID" ]; then
            echo "ERROR: Failed to get admin user ID"
            exit 1
          fi

          : "Creating reusable preauth key... (10 years expiration)"
          PREAUTH_KEY=$( kubectl exec -n "$HEADSCALE_NAMESPACE" deployment/headscale -- \
                            headscale preauthkeys --user "$USER_ID" \
                              create --reusable --expiration 87600h -o yaml |
                            yq eval -r '.key' - )
          if [ -z "$PREAUTH_KEY" ]; then
            echo "ERROR: Failed to extract preauth key"
            exit 1
          fi

          : "Storing preauth key in Secret..."
          kubectl create secret generic headscale-client-auth \
            --from-literal=authkey="$PREAUTH_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
            