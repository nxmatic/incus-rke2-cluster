apiVersion: v1
kind: ServiceAccount
metadata: # kpt-merge: ${headscale-namespace}/headscale-bootstrap
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
  annotations:
    internal.kpt.dev/upstream-identifier: '|ServiceAccount|${headscale-namespace}|headscale-bootstrap'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: # kpt-merge: ${headscale-namespace}/headscale-bootstrap
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
  annotations:
    internal.kpt.dev/upstream-identifier: 'rbac.authorization.k8s.io|Role|${headscale-namespace}|headscale-bootstrap'
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: # kpt-merge: ${headscale-namespace}/headscale-bootstrap
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
  annotations:
    internal.kpt.dev/upstream-identifier: 'rbac.authorization.k8s.io|RoleBinding|${headscale-namespace}|headscale-bootstrap'
subjects:
- kind: ServiceAccount
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
roleRef:
  kind: Role
  name: headscale-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata: # kpt-merge: ${headscale-namespace}/headscale-bootstrap
  name: headscale-bootstrap
  namespace: ${headscale-namespace} # kpt-set: ${headscale-namespace}
  annotations:
    internal.kpt.dev/upstream-identifier: 'batch|Job|${headscale-namespace}|headscale-bootstrap'
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: headscale-bootstrap
      restartPolicy: OnFailure
      containers:
      - name: bootstrap
        image: flox/empty:1.0.0
        env:
        - name: HEADSCALE_NAMESPACE
          value: ${headscale-namespace} # kpt-set: ${headscale-namespace}
        - name: FLOX_NO_TELEMETRY
          value: "1"
        - name: FLOX_NONINTERACTIVE
          value: "1"
        command:
        - bash
        - -c
        - "set -ex\n\n: \"Waiting for headscale deployment to be available...\"\nkubectl wait --for=condition=available deployment/headscale \\\n  -n \"$HEADSCALE_NAMESPACE\" --timeout=300s\n\n: \"Waiting for headscale pod to be Ready...\"\nkubectl wait --for=condition=Ready pod -l app=headscale \\\n  -n \"$HEADSCALE_NAMESPACE\" --timeout=300s\n\n# Use kubectl exec to run headscale CLI inside the pod\n# The CLI has direct access to headscale without API key requirements\n\n: \"Creating admin user...\"\nkubectl exec -n \"$HEADSCALE_NAMESPACE\" deployment/headscale -- \\\n  headscale users create admin 2>/dev/null || echo \"User admin already exists\"\n\n: \"Getting admin user ID...\"\nUSER_ID=$( kubectl exec -n \"$HEADSCALE_NAMESPACE\" deployment/headscale -- \\\n              headscale users list -o yaml |\n              yq eval -r '.[] | select(.name==\"admin\") | .id' - )\nif [ -z \"$USER_ID\" ]; then\n  echo \"ERROR: Failed to get admin user ID\"\n  exit 1\nfi\n\n: \"Creating reusable preauth key... (10 years expiration)\"\nPREAUTH_KEY=$( kubectl exec -n \"$HEADSCALE_NAMESPACE\" deployment/headscale -- \\\n                  headscale preauthkeys --user \"$USER_ID\" \\\n                    create --reusable --expiration 87600h -o yaml |\n                  yq eval -r '.key' - )\nif [ -z \"$PREAUTH_KEY\" ]; then\n  echo \"ERROR: Failed to extract preauth key\"\n  exit 1\nfi\n\n: \"Storing preauth key in Secret...\"\nkubectl create secret generic headscale-client-auth \\\n  --from-literal=authkey=\"$PREAUTH_KEY\" \\\n  --dry-run=client -o yaml | kubectl apply -f -\n  "
        resources:
          limits:
            cpu: 250m
            ephemeral-storage: 256Mi
            memory: 256Mi
          requests:
            cpu: 50m
            ephemeral-storage: 64Mi
            memory: 64Mi
      runtimeClassName: flox
    metadata:
      annotations:
        flox.dev/environment: "${headscale-flox-env}" # kpt-set: ${headscale-flox-env}
